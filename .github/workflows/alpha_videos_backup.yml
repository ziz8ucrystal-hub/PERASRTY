          echo "✅ اكتمل التحميل!"
          ls -lh *.mp4 | wc -l | xargs echo "📊 عدد الفيديوهات المحملة:"

      - name: رفع إلى Google Drive
        uses: adityak74/google-drive-upload-github-action@v1.1.0
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: videos/*.mp4
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          
      - name: التقرير النهائي
        run: |
          echo ""
          echo "========================================="
          echo "🎉 تم رفع الفيديوهات إلى Google Drive!"
          echo "========================================="
          echo ""
          echo "📁 رابط المجلد في Google Drive:"
          echo "   https://drive.google.com/drive/folders/${{ secrets.GDRIVE_FOLDER_ID }}"
          echo ""
          echo "========================================="