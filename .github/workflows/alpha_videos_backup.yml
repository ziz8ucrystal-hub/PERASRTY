# ============================================
# الملف النهائي - جميع فيديوهات Alpha University (31 فيديو)
# ============================================

name: "Alpha University - جميع الفيديوهات"

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: تثبيت الأدوات
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: إنشاء المجلد
        run: mkdir -p videos

      - name: تحميل جميع الفيديوهات (31)
        run: |
          cd videos
          
          echo "🎬 بدء تحميل 31 فيديو..."
