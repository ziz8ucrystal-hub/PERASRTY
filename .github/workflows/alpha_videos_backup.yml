# ============================================
# ملف: .github/workflows/auto_upload_to_drive.yml
# تحميل جميع الفيديوهات ورفعها تلقائياً إلى Google Drive
# ============================================

name: "تحميل ورفع فيديوهات Alpha إلى Google Drive"

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
      - name: تثبيت الأدوات
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: تثبيت rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: إعداد rclone
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf

      - name: إنشاء المجلد
        run: mkdir -p videos

      - name: تحميل جميع الفيديوهات
