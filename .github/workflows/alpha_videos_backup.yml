                 "https://vimeo.com/1086210242/7b545c33d4" || true
                 
          yt-dlp --impersonate chrome-120 \
                 --add-header "Referer: https://www.alphauniversity.academy/" \
                 -o "30_P1_Order_Block_01.mp4" \
                 "https://vimeo.com/1086207541" || true
                 
          yt-dlp --impersonate chrome-120 \
                 --add-header "Referer: https://www.alphauniversity.academy/" \
                 -o "31_P2_Order_Block_02.mp4" \
                 "https://vimeo.com/1086207587" || true

      - name: إنشاء تقرير بالملفات المحملة
        run: |
          cd videos
          
          echo "filename,size_bytes,status" > ../metadata/report.csv
          
          for file in *.mp4; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file")
              echo "$file,$size,downloaded" >> ../metadata/report.csv
              echo "✅ $file - $(du -h "$file" | cut -f1)"
            fi
          done
          
          total=$(ls -1 *.mp4 2>/dev/null | wc -l)
          echo ""
          echo "========================================="
          echo "📊 تم تحميل $total من 31 فيديو"
          echo "========================================="

      - name: رفع جميع الفيديوهات
        uses: actions/upload-artifact@v4
        with:
          name: Alpha-University-All-Videos
          path: |
            videos/*.mp4
            metadata/*.csv
          retention-days: 7

      - name: التقرير النهائي
        run: |
          echo ""
          echo "========================================="
          echo "✅ اكتملت عملية تحميل جميع الفيديوهات!"
          echo "========================================="
          echo ""
          echo "📁 حمل الفيديوهات من:"
          echo "   Actions -> Artifacts -> Alpha-University-All-Videos"
          echo ""
          echo "📊 التقرير موجود داخل الملف المضغوط"
          echo "========================================="