name: "تحميل جميع فيديوهات Alpha University"

on:
  workflow_dispatch:

jobs:
  download-all:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: تثبيت أدوات التحميل
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: إنشاء المجلدات
        run: |
          mkdir -p videos
          mkdir -p metadata

      - name: تحميل جميع الفيديوهات (31 فيديو)
        run: |
          cd videos
          
          # ============================================
          # القسم 1: Basics of crypto (6 فيديوهات)
          # ============================================
          echo "📥 تحميل Basics of crypto..."
          
          yt-dlp --impersonate chrome-120 \
                 --add-header "Referer: https://www.alphauniversity.academy/" \
                 -o "01_The_Basics_Part_1.mp4" \
                 "https://player.vimeo.com/video/1044120852" || true
                 
          yt-dlp --impersonate chrome-120 \
                 --add-header "Referer: https://www.alphauniversity.academy/" \
