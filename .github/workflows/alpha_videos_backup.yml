# ملف: .github/workflows/final_upload.yml
name: "رفع فيديوهات Alpha إلى Google Drive"

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: تثبيت الأدوات
        run: |
          sudo apt-get update
          pip install yt-dlp

      - name: تثبيت rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: تحميل 31 فيديو
        run: |
          mkdir -p videos
          cd videos
          
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "01_The_Basics_Part_1.mp4" "https://player.vimeo.com/video/1044120852" || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "02_The_Basics_Part_2.mp4" "https://player.vimeo.com/video/1044120914" || true
