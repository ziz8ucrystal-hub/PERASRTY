name: "Alpha University - Full Backup All Videos"

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
          pip install yt-dlp

      - name: Create folders
        run: |
          mkdir -p videos
          mkdir -p metadata

      - name: Download all 31 videos
        id: download
        run: |
          cd videos
          
          # All 31 videos
          yt-dlp "https://player.vimeo.com/video/1044120852" -o "01_The_Basics_Part_1.mp4"
          yt-dlp "https://player.vimeo.com/video/1044120914" -o "02_The_Basics_Part_2.mp4"
          yt-dlp "https://player.vimeo.com/video/1044120961" -o "03_The_Basics_Part_3.mp4"
          yt-dlp "https://player.vimeo.com/video/1043876016" -o "04_The_Basics_Part_4.mp4"
          yt-dlp "https://player.vimeo.com/video/1043976446" -o "05_Time_Frame.mp4"
          yt-dlp "https://player.vimeo.com/video/1043974638" -o "06_Trading_View.mp4"
          yt-dlp "https://player.vimeo.com/video/1043974824" -o "07_Price_Action.mp4"
          yt-dlp "https://player.vimeo.com/video/1043983996" -o "08_Market_Structure.mp4"
          yt-dlp "https://player.vimeo.com/video/1043971382" -o "09_Consolidation.mp4"
          yt-dlp "https://player.vimeo.com/video/1045167024" -o "10_Order_Block_1.mp4"
          yt-dlp "https://player.vimeo.com/video/1043976568" -o "11_Fair_Value_Gap.mp4"
          yt-dlp "https://player.vimeo.com/video/1043974689" -o "12_OB.mp4"
          yt-dlp "https://player.vimeo.com/video/1045168170" -o "13_Volume_Profile.mp4"
          yt-dlp "https://player.vimeo.com/video/1043973455" -o "14_Welcome.mp4"
          yt-dlp "https://player.vimeo.com/video/1043976498" -o "15_What_is_Risk_Management.mp4"
          yt-dlp "https://player.vimeo.com/video/1043971955" -o "16_Stop_Loss.mp4"
          yt-dlp "https://player.vimeo.com/video/1043974742" -o "17_Stop_Hunt.mp4"
          yt-dlp "https://player.vimeo.com/video/1043974778" -o "18_Psychology.mp4"
          yt-dlp "https://player.vimeo.com/video/1064144416" -o "19_Risk_Management_P1.mp4"
          yt-dlp "https://vimeo.com/1086214885" -o "20_P1_Psychology1.mp4"
          yt-dlp "https://vimeo.com/1086214933" -o "21_p2_Psychology2.mp4"
          yt-dlp "https://vimeo.com/1086211587" -o "22_P2_Pric_Actioon.mp4"
          yt-dlp "https://vimeo.com/1086211265" -o "23_P1_Price_Action_01.mp4"
          yt-dlp "https://vimeo.com/1086215569" -o "24_P1_Stop_Hunt_01.mp4"
          yt-dlp "https://vimeo.com/1086215684" -o "25_P2_Stop_Hunt_02.mp4"
          yt-dlp "https://vimeo.com/1086215458" -o "26_P1_Tp.mp4"
          yt-dlp "https://vimeo.com/1086215516" -o "27_P2_Tpsl02.mp4"
          yt-dlp "https://vimeo.com/1086209786" -o "28_P1_Volume_P_01.mp4"
          yt-dlp "https://vimeo.com/1086210242/7b545c33d4" -o "29_P2_Volume_P_02.mp4"
          yt-dlp "https://vimeo.com/1086207541" -o "30_P1_Order_Block_01.mp4"
          yt-dlp "https://vimeo.com/1086207587" -o "31_P2_Order_Block_02.mp4"
          
          # Count successful downloads
          count=$(ls -1 *.mp4 2>/dev/null | wc -l)
          echo "downloaded=$count" >> $GITHUB_OUTPUT
          
          # List all files
          echo ""
          echo "========== DOWNLOADED VIDEOS =========="
          ls -lh *.mp4
          echo "========================================"

      - name: Get video metadata
        run: |
          cd videos
          
          # Create CSV with all video info
          echo "filename,title,duration_seconds,duration_formatted,size_mb" > ../metadata/videos_info.csv
          
          for file in *.mp4; do
            if [ -f "$file" ]; then
              title=$(echo "$file" | sed 's/\.mp4//' | sed 's/^[0-9]*_//')
              duration=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$file" 2>/dev/null | cut -d. -f1)
              minutes=$((duration / 60))
              seconds=$((duration % 60))
              size_mb=$(du -m "$file" | cut -f1)
              
              echo "$file,$title,$duration,${minutes}:${seconds},$size_mb" >> ../metadata/videos_info.csv
              
              # Create individual JSON for each video
              cat > "../metadata/${file}.json" << EOF
{
  "filename": "$file",
  "title": "$title",
  "duration_seconds": $duration,
  "duration_formatted": "${minutes}:${seconds}",
  "size_mb": $size_mb,
  "status": "success"
}
EOF
            fi
          done

      - name: Upload videos to Google Drive
        uses: Jumbo810/Upload_Github_Artifacts_TO_GDrive@v2.3.4
        with:
          target: "videos/*.mp4"
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          parent_folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}

      - name: Upload metadata to Google Drive
        uses: Jumbo810/Upload_Github_Artifacts_TO_GDrive@v2.3.4
        with:
          target: "metadata/*"
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          parent_folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}

      - name: Final report
        run: |
          echo ""
          echo "========================================="
          echo "✅ BACKUP COMPLETED SUCCESSFULLY!"
          echo "========================================="
          echo ""
          echo "📊 Total videos downloaded: ${{ steps.download.outputs.downloaded }} / 31"
          echo ""
          echo "📁 Files uploaded to Google Drive:"
          echo "   - videos/ (31 MP4 files)"
          echo "   - metadata/videos_info.csv (all video info)"
          echo "   - metadata/*.json (individual video metadata)"
          echo ""
          echo "🔗 Google Drive folder:"
          echo "   https://drive.google.com/drive/folders/${{ secrets.GDRIVE_FOLDER_ID }}"
          echo ""
          echo "========================================="
