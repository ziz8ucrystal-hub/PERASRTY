# ============================================
# الحل النهائي الذي يعمل - جميع الفيديوهات
# ============================================

name: "Alpha University - التحميل النهائي"

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: تثبيت الأدوات
        run: |
          sudo apt-get update
          pip install yt-dlp

      - name: إنشاء المجلد
        run: mkdir -p videos

      - name: تحميل جميع الفيديوهات
        run: |
          cd videos
          
          # ========================================
          # جميع الروابط بصيغة vimeo.com (النوع الناجح)
          # ========================================
          
          echo "🎬 بدء تحميل الفيديوهات..."
          echo ""
          
          # تحميل فيديو P1 Stop Hunt 01 (نجح سابقاً)
          echo "📥 تحميل: P1 Stop Hunt 01"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P1_Stop_Hunt_01.mp4" "https://vimeo.com/1086215569"
          
          echo "📥 تحميل: P1 Psychology1"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P1_Psychology1.mp4" "https://vimeo.com/1086214885"
          
          echo "📥 تحميل: p2 Psychology2"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "p2_Psychology2.mp4" "https://vimeo.com/1086214933"
          
          echo "📥 تحميل: P2 Tpsl02"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P2_Tpsl02.mp4" "https://vimeo.com/1086215516"
          
          echo "📥 تحميل: P1 Tp"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P1_Tp.mp4" "https://vimeo.com/1086215458"
          
          echo "📥 تحميل: P2 Order Block 02"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P2_Order_Block_02.mp4" "https://vimeo.com/1086207587"
          
          echo "📥 تحميل: P1 Order Block 01"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P1_Order_Block_01.mp4" "https://vimeo.com/1086207541"
          
          echo "📥 تحميل: P1 Price Action 01"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P1_Price_Action_01.mp4" "https://vimeo.com/1086211265"
          
          echo "📥 تحميل: P2 Pric Actioon"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P2_Pric_Actioon.mp4" "https://vimeo.com/1086211587"
          
          echo "📥 تحميل: P1 Volume P 01"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P1_Volume_P_01.mp4" "https://vimeo.com/1086209786"
          
          echo "📥 تحميل: P2 Volume P 02"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P2_Volume_P_02.mp4" "https://vimeo.com/1086210242/7b545c33d4"
          
          echo "📥 تحميل: P2 Stop Hunt 02"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "P2_Stop_Hunt_02.mp4" "https://vimeo.com/1086215684"
          
          echo ""
          echo "========================================="
          echo "✅ اكتمل التحميل!"
          echo "========================================="
          
          ls -lh *.mp4 2>/dev/null || echo "لم يتم تحميل أي ملف"

      - name: رفع الفيديوهات
        uses: actions/upload-artifact@v4
        with:
          name: Alpha-Videos
          path: videos/*.mp4
          retention-days: 7