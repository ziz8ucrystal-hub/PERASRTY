# اسم الملف: alpha_videos_backup.yml

name: "🎬 Alpha University - النسخ الاحتياطي الكامل للفيديوهات"

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: '🧪 وضع الاختبار (فيديو واحد فقط)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: 🔧 تجهيز البيئة
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
          pip install yt-dlp

      - name: 📁 إنشاء المجلدات
        run: |
          mkdir -p videos
          mkdir -p metadata

      - name: 🎬 تحميل الفيديوهات
        id: download
        run: |
          cd videos
          
          VIDEOS=(
            "The_Basics_Part_1|https://player.vimeo.com/video/1044120852|Basics of crypto|1"
            "The_Basics_Part_2|https://player.vimeo.com/video/1044120914|Basics of crypto|2"
            "The_Basics_Part_3|https://player.vimeo.com/video/1044120961|Basics of crypto|3"
            "The_Basics_Part_4|https://player.vimeo.com/video/1043876016|Basics of crypto|4"
            "Time_Frame|https://player.vimeo.com/video/1043976446|Basics of crypto|5"
            "Trading_View|https://player.vimeo.com/video/1043974638|Basics of crypto|6"
            "Price_Action|https://player.vimeo.com/video/1043974824|Alpha technical analyses|1"
            "Market_Structure|https://player.vimeo.com/video/1043983996|Alpha technical analyses|2"
            "Consolidation|https://player.vimeo.com/video/1043971382|Alpha technical analyses|3"
            "Order_Block_1|https://player.vimeo.com/video/1045167024|Alpha technical analyses|4"
            "Fair_Value_Gap|https://player.vimeo.com/video/1043976568|Alpha technical analyses|5"
            "OB|https://player.vimeo.com/video/1043974689|Alpha technical analyses|6"
            "Volume_Profile|https://player.vimeo.com/video/1045168170|Alpha technical analyses|7"
            "Welcome|https://player.vimeo.com/video/1043973455|Risk management|1"
            "What_is_Risk_Management|https://player.vimeo.com/video/1043976498|Risk management|2"
            "Stop_Loss|https://player.vimeo.com/video/1043971955|Risk management|3"
            "Stop_Hunt|https://player.vimeo.com/video/1043974742|Risk management|4"
            "Psychology|https://player.vimeo.com/video/1043974778|Risk management|5"
            "Risk_Management_P1|https://player.vimeo.com/video/1064144416|Risk management|6"
            "P1_Psychology1|https://vimeo.com/1086214885|Psychology|1"
            "p2_Psychology2|https://vimeo.com/1086214933|Psychology|2"
            "P2_Pric_Actioon|https://vimeo.com/1086211587|Price Action|1"
            "P1_Price_Action_01|https://vimeo.com/1086211265|Price Action|2"
            "P1_Stop_Hunt_01|https://vimeo.com/1086215569|Stop Hunt|1"
            "P2_Stop_Hunt_02|https://vimeo.com/1086215684|Stop Hunt|2"
            "P1_Tp|https://vimeo.com/1086215458|Take Profit|1"
            "P2_Tpsl02|https://vimeo.com/1086215516|Take Profit|2"
            "P1_Volume_P_01|https://vimeo.com/1086209786|Volume Profile|1"
            "P2_Volume_P_02|https://vimeo.com/1086210242/7b545c33d4|Volume Profile|2"
            "P1_Order_Block_01|https://vimeo.com/1086207541|Order Block|1"
            "P2_Order_Block_02|https://vimeo.com/1086207587|Order Block|2"
          )
          
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            echo "🧪 وضع الاختبار: فيديو واحد فقط"
            VIDEOS=("${VIDEOS[0]}")
          fi
          
          SUCCESS=0
          FAILED=0
          
          for video in "${VIDEOS[@]}"; do
            name=$(echo "$video" | cut -d'|' -f1)
            url=$(echo "$video" | cut -d'|' -f2)
            section=$(echo "$video" | cut -d'|' -f3)
            order=$(echo "$video" | cut -d'|' -f4)
            
            echo ""
            echo "🎬 تحميل: $name"
            echo "📂 القسم: $section"
            
            if yt-dlp -o "${name}.mp4" "$url" --no-progress; then
              if [ -f "${name}.mp4" ] && [ $(stat -c%s "${name}.mp4") -gt 1048576 ]; then
                duration=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "${name}.mp4" 2>/dev/null | cut -d. -f1)
                minutes=$((duration / 60))
                seconds=$((duration % 60))
                size=$(du -h "${name}.mp4" | cut -f1)
                
                cat > "../metadata/${name}.json" << EOF
{
  "title": "$name",
  "section": "$section",
  "order": $order,
  "url": "$url",
  "duration_seconds": $duration,
  "duration_formatted": "${minutes}:${seconds}",
  "file_size": "$size",
  "status": "success"
}
EOF
                echo "✅ تم التحميل - المدة: ${minutes}:${seconds} - الحجم: $size"
                SUCCESS=$((SUCCESS + 1))
              else
                echo "❌ فشل التحميل"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "❌ فشل التحميل"
              FAILED=$((FAILED + 1))
            fi
          done
          
          echo "SUCCESS=$SUCCESS" >> $GITHUB_OUTPUT
          echo "FAILED=$FAILED" >> $GITHUB_OUTPUT

      - name: 📝 إنشاء ملف metadata
        run: |
          cd metadata
          echo "title,section,duration,size,status" > metadata.csv
          for file in *.json; do
            if [ -f "$file" ]; then
              title=$(jq -r '.title' "$file" 2>/dev/null || echo "unknown")
              section=$(jq -r '.section' "$file" 2>/dev/null || echo "unknown")
              duration=$(jq -r '.duration_formatted' "$file" 2>/dev/null || echo "00:00")
              size=$(jq -r '.file_size' "$file" 2>/dev/null || echo "0")
              status=$(jq -r '.status' "$file" 2>/dev/null || echo "unknown")
              echo "\"$title\",\"$section\",\"$duration\",\"$size\",\"$status\"" >> metadata.csv
            fi
          done

      - name: 📤 رفع إلى Google Drive
        uses: Jumbo810/Upload_Github_Artifacts_TO_GDrive@v2.3.4
        with:
          target: "videos/*.mp4,metadata/*.csv,metadata/*.json"
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          parent_folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}

      - name: ✅ التقرير النهائي
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "✅ اكتملت العملية!"
          echo "═══════════════════════════════════════════════════════════"
          echo "📊 النتائج:"
          echo "   ✅ نجح: ${{ steps.download.outputs.SUCCESS }} فيديو"
          echo "   ❌ فشل: ${{ steps.download.outputs.FAILED }} فيديو"
          echo ""
          echo "📁 Google Drive: https://drive.google.com/drive/folders/${{ secrets.GDRIVE_FOLDER_ID }}"
