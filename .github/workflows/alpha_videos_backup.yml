      - name: رفع جميع الفيديوهات إلى Google Drive
        run: |
          echo ""
          echo "========================================="
          echo "📤 بدء رفع الفيديوهات إلى Google Drive"
          echo "========================================="
          
          # رفع كل مجلد videos إلى Drive
          rclone copy videos/ gdrive:Alpha_University_Videos/ \
            --progress \
            --verbose \
            --transfers 4 \
            --checkers 8 \
            --retries 5
          
          echo ""
          echo "========================================="
          echo "✅ تم رفع جميع الفيديوهات إلى Google Drive"
          echo "========================================="

      - name: التقرير النهائي
