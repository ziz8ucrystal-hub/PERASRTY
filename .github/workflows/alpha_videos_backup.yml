                 "https://player.vimeo.com/video/1043974638" || true
          
          # ============================================
          # القسم 2: Alpha technical analyses (7 فيديوهات)
          # ============================================
          echo "📥 تحميل Alpha technical analyses..."
          
          yt-dlp --impersonate chrome-120 \
                 --add-header "Referer: https://www.alphauniversity.academy/" \
                 -o "07_Price_Action.mp4" \
                 "https://player.vimeo.com/video/1043974824" || true
                 
          yt-dlp --impersonate chrome-120 \
                 --add-header "Referer: https://www.alphauniversity.academy/" \
