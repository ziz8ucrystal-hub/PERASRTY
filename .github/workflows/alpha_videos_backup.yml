          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "28_P1_Volume_P_01.mp4" "https://vimeo.com/1086209786" || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "29_P2_Volume_P_02.mp4" "https://vimeo.com/1086210242/7b545c33d4" || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "30_P1_Order_Block_01.mp4" "https://vimeo.com/1086207541" || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "31_P2_Order_Block_02.mp4" "https://vimeo.com/1086207587" || true
          
          echo "✅ تم تحميل: $(ls -1 *.mp4 | wc -l) فيديو"

      - name: إعداد rclone
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf
          cat ~/.config/rclone/rclone.conf

      - name: رفع إلى Google Drive
        run: |
          rclone copy videos/ gdrive:Alpha_University_Videos/ --progress --verbose

      - name: التقرير النهائي
        run: |
          echo "========================================="
          echo "✅ تم رفع الفيديوهات إلى Google Drive!"
          echo "📁 https://drive.google.com/drive/folders/${{ secrets.GDRIVE_FOLDER_ID }}"
          echo "========================================="