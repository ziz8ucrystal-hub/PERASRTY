# ============================================
# حل كامل - FFmpeg + yt-dlp
# ملف: .github/workflows/alpha_complete.yml
# ============================================

name: "Alpha University - تحميل جميع الفيديوهات"

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: تثبيت جميع الأدوات
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg mediainfo
          pip install yt-dlp

      - name: إنشاء الهيكل
        run: |
          mkdir -p videos
          mkdir -p metadata
          cd videos

      - name: تحميل جميع الفيديوهات (21 فيديو)
        run: |
          cd videos
          
          # ========================================
          # قائمة الفيديوهات كاملة
          # ========================================
          
          echo "🎬 بدء تحميل الفيديوهات..."
          echo ""
          
          # 1. Risk Management P 1
          echo "[1/21] تحميل: Risk Management P 1"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "01_Risk_Management_P1.mp4" \
                 "https://player.vimeo.com/video/1064144416" 2>/dev/null && \
                 ffmpeg -i "01_Risk_Management_P1.mp4" -c copy -map 0 -metadata title="Risk Management P 1" "01_temp.mp4" 2>/dev/null && mv "01_temp.mp4" "01_Risk_Management_P1.mp4"
          
          # 2. P1 Stop Hunt 01
          echo "[2/21] تحميل: P1 Stop Hunt 01"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "02_P1_Stop_Hunt_01.mp4" \
                 "https://vimeo.com/1086215569" 2>/dev/null
          
          # 3. The Basics Part 2
          echo "[3/21] تحميل: The Basics Part 2"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "03_The_Basics_Part_2.mp4" \
                 "https://player.vimeo.com/video/1044120914" 2>/dev/null
          
          # 4. Trading View
          echo "[4/21] تحميل: Trading View"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "04_Trading_View.mp4" \
                 "https://player.vimeo.com/video/1043974638" 2>/dev/null
          
          # 5. P2 Tpsl02
          echo "[5/21] تحميل: P2 Tpsl02"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "05_P2_Tpsl02.mp4" \
                 "https://vimeo.com/1086215516" 2>/dev/null
          
          # 6. P1 Tp
          echo "[6/21] تحميل: P1 Tp"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "06_P1_Tp.mp4" \
                 "https://vimeo.com/1086215458" 2>/dev/null
          
          # 7. P2 Order Block 02
          echo "[7/21] تحميل: P2 Order Block 02"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "07_P2_Order_Block_02.mp4" \
                 "https://vimeo.com/1086207587" 2>/dev/null
          
          # 8. p2 Psychology2
          echo "[8/21] تحميل: p2 Psychology2"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "08_p2_Psychology2.mp4" \
                 "https://vimeo.com/1086214933" 2>/dev/null
          
          # 9. P1 Order Block 01
          echo "[9/21] تحميل: P1 Order Block 01"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "09_P1_Order_Block_01.mp4" \
                 "https://vimeo.com/1086207541" 2>/dev/null
          
          # 10. P1 Psychology1
          echo "[10/21] تحميل: P1 Psychology1"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "10_P1_Psychology1.mp4" \
                 "https://vimeo.com/1086214885" 2>/dev/null
          
          # 11. P1 Price Action 01
          echo "[11/21] تحميل: P1 Price Action 01"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "11_P1_Price_Action_01.mp4" \
                 "https://vimeo.com/1086211265" 2>/dev/null
          
          # 12. Volume Profile
          echo "[12/21] تحميل: Volume Profile"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "12_Volume_Profile.mp4" \
                 "https://player.vimeo.com/video/1045168170" 2>/dev/null
          
          # 13. Fair Value Gap
          echo "[13/21] تحميل: Fair Value Gap"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "13_Fair_Value_Gap.mp4" \
                 "https://player.vimeo.com/video/1043976568" 2>/dev/null
          
          # 14. Order Block 1
          echo "[14/21] تحميل: Order Block 1"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "14_Order_Block_1.mp4" \
                 "https://player.vimeo.com/video/1045167024" 2>/dev/null
          
          # 15. OB
          echo "[15/21] تحميل: OB"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "15_OB.mp4" \
                 "https://player.vimeo.com/video/1043974689" 2>/dev/null
          
          # 16. Consolidation
          echo "[16/21] تحميل: Consolidation"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "16_Consolidation.mp4" \
                 "https://player.vimeo.com/video/1043971382" 2>/dev/null
          
          # 17. Market Structure
          echo "[17/21] تحميل: Market Structure"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "17_Market_Structure.mp4" \
                 "https://player.vimeo.com/video/1043983996" 2>/dev/null
          
          # 18. Price Action
          echo "[18/21] تحميل: Price Action"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "18_Price_Action.mp4" \
                 "https://player.vimeo.com/video/1043974824" 2>/dev/null
          
          # 19. Psychology
          echo "[19/21] تحميل: Psychology"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "19_Psychology.mp4" \
                 "https://player.vimeo.com/video/1043974778" 2>/dev/null
          
          # 20. What is Risk Management
          echo "[20/21] تحميل: What is Risk Management"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "20_What_is_Risk_Management.mp4" \
                 "https://player.vimeo.com/video/1043976498" 2>/dev/null
          
          # 21. The Basics Part 4
          echo "[21/21] تحميل: The Basics Part 4"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" \
                 -f "best[height<=720]" \
                 -o "21_The_Basics_Part_4.mp4" \
                 "https://player.vimeo.com/video/1043876016" 2>/dev/null
          
          echo ""
          echo "========================================="

      - name: استخراج معلومات الفيديوهات
        run: |
          cd videos
          
          echo "filename,duration,size_mb,resolution" > ../metadata/report.csv
          
          for file in *.mp4; do
            if [ -f "$file" ]; then
              duration=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$file" 2>/dev/null | cut -d. -f1)
              minutes=$((duration / 60))
              seconds=$((duration % 60))
              size=$(du -m "$file" | cut -f1)
              resolution=$(ffprobe -v error -show_entries stream=width,height -of default=noprint_wrappers=1:nokey=1 "$file" 2>/dev/null | head -2 | tr '\n' 'x' | sed 's/x$//')
              echo "$file,${minutes}:${seconds},$size,$resolution" >> ../metadata/report.csv
            fi
          done
          
          echo ""
          echo "📊 تقرير الفيديوهات:"
          cat ../metadata/report.csv

      - name: رفع الفيديوهات
        uses: actions/upload-artifact@v4
        with:
          name: Alpha-University-Complete
          path: |
            videos/*.mp4
            metadata/*.csv
          retention-days: 7

      - name: التقرير النهائي
        run: |
          cd videos
          count=$(ls -1 *.mp4 2>/dev/null | wc -l)
          total_size=$(du -sh . | cut -f1)
          
          echo ""
          echo "========================================="
          echo "✅ اكتمل التحميل بنجاح!"
          echo "========================================="
          echo ""
          echo "📊 الإحصائيات:"
          echo "   🎬 عدد الفيديوهات: $count / 21"
          echo "   💾 الحجم الإجمالي: $total_size"
          echo ""
          echo "📁 تحميل الملفات من:"
          echo "   Actions → Artifacts → Alpha-University-Complete"
          echo ""
          echo "========================================="