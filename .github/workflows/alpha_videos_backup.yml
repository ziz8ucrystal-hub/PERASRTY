          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "31_P2_Tpsl02.mp4" "https://vimeo.com/1086215516" 2>/dev/null
          
          echo ""
          echo "========================================="
          echo "✅ اكتمل التحميل!"
          echo "========================================="
          
          ls -lh *.mp4 | wc -l | xargs echo "📊 عدد الفيديوهات المحملة:"

      - name: رفع الفيديوهات
        uses: actions/upload-artifact@v4
