          # ========================================
          # تحميل كل الفيديوهات واحد تلو الآخر
          # ========================================
          
          echo "[1/31] تحميل: Risk Management P 1"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "01_Risk_Management_P1.mp4" "https://player.vimeo.com/video/1064144416" 2>/dev/null
          
          echo "[2/31] تحميل: P1 Stop Hunt 01"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "02_P1_Stop_Hunt_01.mp4" "https://vimeo.com/1086215569" 2>/dev/null
          
