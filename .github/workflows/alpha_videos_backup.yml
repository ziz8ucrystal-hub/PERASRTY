# ملف: .github/workflows/drive_upload.yml
name: "رفع فيديوهات Alpha إلى Google Drive"

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: تثبيت yt-dlp
        run: pip install yt-dlp

      - name: إنشاء المجلدات
        run: |
          mkdir -p videos/Basics_of_Crypto
          mkdir -p videos/Alpha_Technical_Analyses
          mkdir -p videos/Risk_Management
          mkdir -p videos/Psychology
          mkdir -p videos/Price_Action
          mkdir -p videos/Stop_Hunt
          mkdir -p videos/Take_Profit
          mkdir -p videos/Volume_Profile
          mkdir -p videos/Order_Block

      - name: تحميل الفيديوهات
        run: |
          cd videos
          
          # Basics of Crypto
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Basics_of_Crypto/01_The_Basics_Part_1.mp4" "https://player.vimeo.com/video/1044120852" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Basics_of_Crypto/02_The_Basics_Part_2.mp4" "https://player.vimeo.com/video/1044120914" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Basics_of_Crypto/03_The_Basics_Part_3.mp4" "https://player.vimeo.com/video/1044120961" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Basics_of_Crypto/04_The_Basics_Part_4.mp4" "https://player.vimeo.com/video/1043876016" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Basics_of_Crypto/05_Time_Frame.mp4" "https://player.vimeo.com/video/1043976446" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Basics_of_Crypto/06_Trading_View.mp4" "https://player.vimeo.com/video/1043974638" 2>/dev/null || true
          
          # Alpha Technical Analyses
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Alpha_Technical_Analyses/07_Price_Action.mp4" "https://player.vimeo.com/video/1043974824" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Alpha_Technical_Analyses/08_Market_Structure.mp4" "https://player.vimeo.com/video/1043983996" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Alpha_Technical_Analyses/09_Consolidation.mp4" "https://player.vimeo.com/video/1043971382" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Alpha_Technical_Analyses/10_Order_Block_1.mp4" "https://player.vimeo.com/video/1045167024" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Alpha_Technical_Analyses/11_Fair_Value_Gap.mp4" "https://player.vimeo.com/video/1043976568" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Alpha_Technical_Analyses/12_OB.mp4" "https://player.vimeo.com/video/1043974689" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Alpha_Technical_Analyses/13_Volume_Profile.mp4" "https://player.vimeo.com/video/1045168170" 2>/dev/null || true
          
          # Risk Management
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Risk_Management/14_Welcome.mp4" "https://player.vimeo.com/video/1043973455" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Risk_Management/15_What_is_Risk_Management.mp4" "https://player.vimeo.com/video/1043976498" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Risk_Management/16_Stop_Loss.mp4" "https://player.vimeo.com/video/1043971955" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Risk_Management/17_Stop_Hunt.mp4" "https://player.vimeo.com/video/1043974742" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Risk_Management/18_Psychology.mp4" "https://player.vimeo.com/video/1043974778" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Risk_Management/19_Risk_Management_P1.mp4" "https://player.vimeo.com/video/1064144416" 2>/dev/null || true
          
          # Psychology
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Psychology/20_P1_Psychology1.mp4" "https://vimeo.com/1086214885" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Psychology/21_p2_Psychology2.mp4" "https://vimeo.com/1086214933" 2>/dev/null || true
          
          # Price Action
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Price_Action/22_P2_Pric_Actioon.mp4" "https://vimeo.com/1086211587" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Price_Action/23_P1_Price_Action_01.mp4" "https://vimeo.com/1086211265" 2>/dev/null || true
          
          # Stop Hunt
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Stop_Hunt/24_P1_Stop_Hunt_01.mp4" "https://vimeo.com/1086215569" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Stop_Hunt/25_P2_Stop_Hunt_02.mp4" "https://vimeo.com/1086215684" 2>/dev/null || true
          
          # Take Profit
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Take_Profit/26_P1_Tp.mp4" "https://vimeo.com/1086215458" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Take_Profit/27_P2_Tpsl02.mp4" "https://vimeo.com/1086215516" 2>/dev/null || true
          
          # Volume Profile
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Volume_Profile/28_P1_Volume_P_01.mp4" "https://vimeo.com/1086209786" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Volume_Profile/29_P2_Volume_P_02.mp4" "https://vimeo.com/1086210242/7b545c33d4" 2>/dev/null || true
          
          # Order Block
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Order_Block/30_P1_Order_Block_01.mp4" "https://vimeo.com/1086207541" 2>/dev/null || true
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "Order_Block/31_P2_Order_Block_02.mp4" "https://vimeo.com/1086207587" 2>/dev/null || true

      - name: رفع إلى Google Drive
        uses: Jumbo810/Upload_Github_Artifacts_TO_GDrive@v2.3.4
        with:
          target: "videos/**/*.mp4"
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          parent_folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}
          child_folder: "Alpha_University_Videos"

      - name: التقرير النهائي
        run: |
          echo ""
          echo "========================================="
          echo "🎉 تم رفع الفيديوهات إلى Google Drive!"
          echo "========================================="
          echo ""
          echo "📁 رابط المجلد:"
          echo "   https://drive.google.com/drive/folders/${{ secrets.GDRIVE_FOLDER_ID }}"
          echo ""
          echo "========================================="