# ============================================
# ملف: .github/workflows/alpha_complete_backup.yml
# النسخة النهائية - جميع فيديوهات Alpha University مرتبة
# ============================================

name: "Alpha University - النسخة الاحتياطية الكاملة"

on:
  workflow_dispatch:
    inputs:
      quality:
        description: 'جودة الفيديو (720p / 480p / 360p)'
        required: false
        default: '720p'
        type: choice
        options:
          - '720p'
          - '480p'
          - '360p'

jobs:
  complete-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    
    steps:
      - name: تثبيت الأدوات
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
          pip install yt-dlp

      - name: إنشاء الهيكل
        run: |
          mkdir -p videos
          mkdir -p metadata
          cd videos
          mkdir -p Basics_of_Crypto
          mkdir -p Alpha_Technical_Analyses
          mkdir -p Risk_Management
          mkdir -p Psychology
          mkdir -p Price_Action
          mkdir -p Stop_Hunt
          mkdir -p Take_Profit
          mkdir -p Volume_Profile
          mkdir -p Order_Block

