# ============================================
# ملف: .github/workflows/upload_to_drive.yml
# تحميل الفيديوهات ورفعها إلى Google Drive
# ============================================

name: "Alpha University - رفع إلى Google Drive"

on:
  workflow_dispatch:

jobs:
  upload-to-drive:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: تثبيت الأدوات
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: إنشاء المجلدات
        run: mkdir -p videos

      - name: تحميل الفيديوهات
        run: |
          cd videos
          
          echo "🎬 بدء تحميل الفيديوهات..."
          
          # تحميل جميع الفيديوهات الـ 31
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "01_Risk_Management_P1.mp4" "https://player.vimeo.com/video/1064144416" 2>/dev/null || echo "فشل الفيديو الأول"
          yt-dlp --add-header "Referer: https://www.alphauniversity.academy/" -f "best[height<=720]" -o "02_P1_Stop_Hunt_01.mp4" "https://vimeo.com/1086215569" 2>/dev/null
